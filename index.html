<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta CDF</title>
  <!-- Font Awesome para ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.10);
      --border: rgba(255,255,255,.14);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --accent: #7c3aed;
      --error: #ef4444;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: 
        radial-gradient(1100px 600px at 20% 0%, rgba(124,58,237,.35), transparent 55%),
        radial-gradient(900px 500px at 90% 15%, rgba(34,197,94,.25), transparent 55%),
        var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      margin: 1rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #c4b5fd, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: var(--muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
      border-left: 3px solid var(--accent);
      padding-left: 0.75rem;
    }
    .input-group {
      margin-bottom: 1.5rem;
      position: relative;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.4);
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: var(--accent);
    }
    .password-wrapper {
      position: relative;
    }
    .toggle-password {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.2rem;
    }
    .toggle-password:hover {
      color: white;
    }
    .btn-login {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
      margin-top: 1rem;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }
    .error-message {
      color: var(--error);
      font-size: 0.9rem;
      margin-top: 1rem;
      text-align: center;
    }
    .info {
      margin-top: 2rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
    .info i {
      color: var(--accent);
    }
    .footer {
      margin-top: 1.5rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
      color: var(--muted);
    }
    .footer a {
      color: #c4b5fd;
      text-decoration: none;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>🔐Nota Técnica CDF</h1>
    <div class="subtitle">Faça seu login para acessar a Nota Técnica</div>

    <!-- Formulário -->
    <div class="input-group">
      <label for="email">E-mail / Usuário</label>
      <input type="text" id="email" placeholder="seu@email.com ou usuário" autocomplete="off">
    </div>

    <div class="input-group">
      <label for="password">Senha</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="••••••••">
        <button class="toggle-password" id="togglePassword" type="button">
          <i class="far fa-eye"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" id="btnLogin">
      <i class="fas fa-arrow-right-to-bracket" style="margin-right: 8px;"></i> Entrar
    </button>

    <div id="errorMessage" class="error-message"></div>

    <div class="info">
      <i class="fas fa-shield-alt"></i> Acesso restrito a usuários autorizados.
    </div>

    <div class="footer">
      <a href="#"><i class=</i>Nota Técnica 2026 - CDF</a>
      <a href="#"><i class=</i></a>
    </div>
  </div>

  <script>
    // ==================================================================
    // LISTA DE USUÁRIOS AUTORIZADOS - Configure aqui os emails e senhas
    // ==================================================================
    const usuarios = [
      { email: 'cdfnota', senha: 'cdfnotagab26' },
      { email: 'fjssteste', senha: 'cdf2026teste' },
     
      // Adicione mais usuários conforme necessário:
      // { email: 'email@dominio.com', senha: 'senha123' },
    ];

    // URL de destino após login bem-sucedido - NOTA TÉCNICA CDF
    const DESTINO = 'https://devfjss.github.io/nota-tecnica-cdf/';

    // Elementos do DOM
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const btnLogin = document.getElementById('btnLogin');
    const errorMsg = document.getElementById('errorMessage');
    const toggleBtn = document.getElementById('togglePassword');

    // Função para mostrar/esconder senha
    toggleBtn.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.innerHTML = type === 'password' ? '<i class="far fa-eye"></i>' : '<i class="far fa-eye-slash"></i>';
    });

    // Função de login
    function realizarLogin() {
      const email = emailInput.value.trim();
      const senha = passwordInput.value.trim();

      // Limpa mensagem anterior
      errorMsg.textContent = '';

      // Validação básica
      if (!email || !senha) {
        errorMsg.textContent = 'Preencha usuário/e-mail e senha.';
        return;
      }

      // Verifica na lista de usuários
      const usuarioEncontrado = usuarios.find(u => u.email === email && u.senha === senha);

      if (usuarioEncontrado) {
        // Sucesso - redireciona para o destino (Nota Técnica CDF)
        window.location.href = DESTINO;
      } else {
        errorMsg.textContent = 'Usuário ou senha inválidos.';
      }
    }

    // Evento do botão
    btnLogin.addEventListener('click', realizarLogin);

    // Permitir pressionar Enter para enviar
    [emailInput, passwordInput].forEach(input => {
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') realizarLogin();
      });
    });
  </script>
</body>
</html>
